name: Weekly Desktop Build

on:
  schedule:
    # Monday 14:35 Asia/Kolkata = Monday 09:05 UTC
    - cron: "5 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  WEEKLY_TAG: weekly-desktop
  ASSET_NAME: radar-desktop_weekly_darwin_universal.zip

jobs:
  build-macos:
    name: Build and Publish Weekly macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend
        run: make frontend embed

      - name: Create dummy kubeconfig for Wails binding generation
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config << 'KUBECONFIG'
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://localhost:6443
            name: dummy
          contexts:
          - context:
              cluster: dummy
              user: dummy
            name: dummy
          current-context: dummy
          users:
          - name: dummy
            user:
              token: dummy
          KUBECONFIG

      - name: Build macOS .app (universal)
        run: |
          cd cmd/desktop
          wails build -platform darwin/universal -ldflags "-X main.version=weekly-${GITHUB_RUN_NUMBER}"

      - name: Archive app
        run: |
          cd build/bin
          mv radar-desktop.app Radar.app
          ditto -c -k --sequesterRsrc --keepParent Radar.app "../../${ASSET_NAME}"
          cd ../..

      - name: Generate checksum
        run: shasum -a 256 "${ASSET_NAME}" > checksums-weekly-desktop.txt

      - name: Publish weekly release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.WEEKLY_TAG }}
          name: Weekly Desktop Build
          prerelease: true
          make_latest: false
          files: |
            ${{ env.ASSET_NAME }}
            checksums-weekly-desktop.txt
          overwrite_files: true

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Weekly Desktop Build"
            echo ""
            if ls "${ASSET_NAME}" 1>/dev/null 2>&1; then
              echo "- Asset: \`${ASSET_NAME}\`"
              echo "- Tag: \`${WEEKLY_TAG}\`"
            else
              echo "Build failed before artifact generation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
